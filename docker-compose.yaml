services:
  db:
    image: postgres
    container_name: postgres_cms
    restart: unless-stopped
    environment:
      POSTGRES_DB: "cms_db"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "moussi@25"

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
